title: Mimikatz Credential Dumping Tool Detected
id: b2c3d4e5-2222-3333-4444-bbccddeeFF00
status: stable
description: Detects execution of Mimikatz credential dumping tool via process name or command line arguments
author: Eddybot
date: 2026/06/29
references:
    - https://attack.mitre.org/techniques/T1003/
tags:
    - attack.credential_access
    - attack.t1003
logsource:
    product: windows
    category: process_creation
detection:
    selection_name:
        Image|endswith: '\mimikatz.exe'
    selection_cmd:
        CommandLine|contains:
            - 'sekurlsa::logonpasswords'
            - 'privilege::debug'
            - 'lsadump::sam'
            - 'kerberos::golden'
    condition: selection_name or selection_cmd
falsepositives:
    - Security researchers running authorized penetration tests
    - Red team exercises with prior approval
level: critical
fields:
    - Image
    - CommandLine
    - ParentImage
    - User