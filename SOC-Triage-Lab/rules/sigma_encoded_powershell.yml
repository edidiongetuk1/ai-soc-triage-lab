title: Suspicious Encoded PowerShell Command Execution
id: c3d4e5f6-3333-4444-5555-ccddeeff0011
status: experimental
description: Detects PowerShell execution with encoded commands and suspicious flags commonly used in attacks
author: Eddybot
date: 2026/06/29
references:
    - https://attack.mitre.org/techniques/T1059/001/
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        Image|endswith: '\powershell.exe'
        CommandLine|contains:
            - '-Enc '
            - '-EncodedCommand'
    filter_legitimate:
        ParentImage|contains:
            - 'C:\Windows\System32\svchost.exe'
    suspicious_flags:
        CommandLine|contains:
            - '-NonI'
            - '-NoP'
            - '-W Hidden'
            - '-WindowStyle Hidden'
    condition: selection and suspicious_flags and not filter_legitimate
falsepositives:
    - Some legitimate software deployment tools use encoded PowerShell
    - SCCM and other management tools
level: high
fields:
    - Image
    - CommandLine
    - ParentImage
    - User